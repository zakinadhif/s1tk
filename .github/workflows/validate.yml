name: Validate

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run prereq cycle detection
        run: pnpm validate
      - name: Run unit tests
        run: pnpm test
      - name: Build (runs Zod schema checks)
        run: pnpm build
